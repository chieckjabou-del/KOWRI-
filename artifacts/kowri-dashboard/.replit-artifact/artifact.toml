kind = "web"
previewPath = "/"
title = "KOWRI Platform Dashboard"
version = "1.0.0"
id = "artifacts/kowri-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25919
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kowri-dashboard run dev"

[services.env]
PORT = "25919"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kowri-dashboard", "run", "build"]
publicDir = "artifacts/kowri-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
